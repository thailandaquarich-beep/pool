kind = "web"
previewPath = "/"
title = "Village Pool Reservation"
version = "1.0.0"
id = "artifacts/pool-reservation"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 24727

[services.development]
run = "pnpm --filter @workspace/pool-reservation run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/pool-reservation", "run", "build" ]
publicDir = "artifacts/pool-reservation/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "24727"
BASE_PATH = "/"
